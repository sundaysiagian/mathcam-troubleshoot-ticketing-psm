<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: #0f0f13;
      color: #f0ece4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── MATH PANEL ── */
    #math-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn .4s ease;
    }

    .label {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #666;
    }

    .equation {
      font-family: 'DM Mono', monospace;
      font-size: 52px;
      font-weight: 500;
      color: #f0ece4;
      letter-spacing: -1px;
      text-align: center;
      line-height: 1;
    }

    .accent { color: #f5c518; }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 300px;
    }

    input[type="number"] {
      flex: 1;
      background: #1c1c24;
      border: 1.5px solid #2e2e3e;
      border-radius: 10px;
      color: #f0ece4;
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      padding: 12px 16px;
      outline: none;
      text-align: center;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button { display: none; }
    input[type="number"]:focus { border-color: #f5c518; }
    input[type="number"].shake {
      animation: shake .35s ease;
      border-color: #e05252 !important;
    }

    button.submit-btn {
      background: #f5c518;
      color: #0f0f13;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 20px;
      cursor: pointer;
      transition: transform .12s, opacity .12s;
    }
    button.submit-btn:hover { opacity: .88; transform: scale(.97); }

    .hint { font-size: 12px; color: #e05252; font-family: 'DM Mono', monospace; min-height: 18px; text-align: center; }
    .attempts { font-size: 13px; color: #555; }
    .attempts span { color: #f5c518; font-family: 'DM Mono', monospace; }

    #log-status {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: #444;
      min-height: 16px;
    }

    /* ── CAMERA PANEL ── */
    #camera-panel {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn .5s ease;
    }

    .success-badge {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .success-badge::before { content: '✔'; }

    #video {
      width: 100%;
      border-radius: 12px;
      background: #1c1c24;
      aspect-ratio: 4/3;
      object-fit: cover;
      border: 2px solid #2e2e3e;
      display: block;
    }

    .controls { display: flex; gap: 10px; }

    button.snap-btn {
      background: #f5c518;
      color: #0f0f13;
      border: none;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      padding: 11px 26px;
      cursor: pointer;
      transition: transform .12s;
    }
    button.snap-btn:hover { transform: scale(.96); }

    #snapshot-wrapper { display: none; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    #snapshot { width: 100%; border-radius: 12px; border: 2px solid #f5c518; }
    .snap-label { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #f5c518; }

    #error {
      color: #e05252;
      font-size: 13px;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
      font-family: 'DM Mono', monospace;
    }

    canvas { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- MATH PANEL -->
  <div id="math-panel">
    <div class="label">Solve to unlock camera</div>
    <div class="equation" id="equation"></div>
    <div class="input-row">
      <input type="number" id="answer-input" placeholder="?" autocomplete="off" />
      <button class="submit-btn" onclick="checkAnswer()">→</button>
    </div>
    <div class="attempts">Attempts left: <span id="tries">3</span></div>
    <div class="hint" id="hint-text"></div>
    <div id="log-status"></div>
  </div>

  <!-- CAMERA PANEL -->
  <div id="camera-panel">
    <div class="success-badge">Correct! Camera unlocked</div>
    <video id="video" autoplay playsinline muted></video>
    <div class="controls">
      <button class="snap-btn" onclick="snap()">📸 Snap</button>
    </div>
    <div id="snapshot-wrapper">
      <div class="snap-label">Last snapshot</div>
      <img id="snapshot" />
    </div>
    <div id="error"></div>
  </div>

</div>
<canvas id="canvas"></canvas>

<script>
  // ── Paste your Apps Script Web App URL here ──
  const LOG_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

  // ── Math problem ──
  const ops = ['+', '-', '×'];
  const op  = ops[Math.floor(Math.random() * ops.length)];
  let a, b, answer;

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  if      (op === '+') { a = rand(5,30);  b = rand(5,30);  answer = a + b; }
  else if (op === '-') { a = rand(15,40); b = rand(1,a);   answer = a - b; }
  else                 { a = rand(2,12);  b = rand(2,12);  answer = a * b; }

  document.getElementById('equation').innerHTML =
    `${a} <span class="accent">${op}</span> ${b} <span class="accent">=</span> ?`;

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  let tries = 3;

  async function logAttempt(result, userAnswer) {
    const statusEl = document.getElementById('log-status');
    statusEl.textContent = 'logging…';
    try {
      await fetch(LOG_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          timestamp: new Date().toISOString(),
          question: `${a} ${op} ${b}`,
          correct_answer: answer,
          user_answer: userAnswer,
          result: result
        })
      });
      statusEl.textContent = '✔ logged to sheet';
    } catch (err) {
      statusEl.textContent = '⚠ could not log: ' + err.message;
    }
  }

  function checkAnswer() {
    const input = document.getElementById('answer-input');
    const val   = parseInt(input.value, 10);

    if (isNaN(val)) { flash(input, 'Enter a number first!'); return; }

    if (val === answer) {
      logAttempt('CORRECT', val);
      document.getElementById('math-panel').style.display = 'none';
      document.getElementById('camera-panel').style.display = 'flex';
      startCamera();
    } else {
      tries--;
      logAttempt('WRONG', val);
      document.getElementById('tries').textContent = tries;
      flash(input, tries > 0
        ? (tries === 1 ? 'Last chance!' : 'Not quite — try again!')
        : `The answer was ${answer}. Resetting…`
      );
      input.value = '';
      if (tries <= 0) setTimeout(() => location.reload(), 1800);
    }
  }

  function flash(inputEl, msg) {
    inputEl.classList.remove('shake');
    void inputEl.offsetWidth;
    inputEl.classList.add('shake');
    document.getElementById('hint-text').textContent = msg;
    inputEl.addEventListener('animationend', () => inputEl.classList.remove('shake'), { once: true });
  }

  // ── Camera (your original code, untouched) ──
  async function startCamera() {
    if (!navigator.mediaDevices?.getUserMedia) {
      document.getElementById('error').textContent = 'Camera API not supported in this browser.';
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      document.getElementById('video').srcObject = stream;
    } catch (err) {
      const errEl = document.getElementById('error');
      if (err.name === 'NotAllowedError') {
        errEl.innerHTML =
          '🚫 Camera permission denied.<br>' +
          'Click the 🔒 lock in your address bar → Camera → Allow → Reload.';
      } else if (err.name === 'NotFoundError') {
        errEl.textContent = '📷 No camera found on this device.';
      } else {
        errEl.textContent = err.name + ': ' + err.message;
      }
    }
  }

  function snap() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const img    = document.getElementById('snapshot');
    const wrap   = document.getElementById('snapshot-wrapper');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    img.src = canvas.toDataURL('image/png');
    wrap.style.display = 'flex';
  }
</script>
</body>
</html>
